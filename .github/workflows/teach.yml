name: Teaching Agent Nightly

on:
  schedule:
    # Runs at 2 AM UTC every day = 8 PM CDT (Austin time)
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  teach:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install 2>/dev/null || echo "No package.json yet"
      
      - name: Run Teaching Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
        run: node agents/teaching-agent.js
      
      - name: Commit & Push Skills
        run: |
          git config user.name "512AI Teaching Agent"
          git config user.email "bot@512ai.co"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: nightly skills learning ($(date -u +'%Y-%m-%d'))"
            git push
          fi
      
      - name: Create Release (if new skills)
        if: success()
        run: |
          VERSION=$(date +%Y.%m.%d)
          git tag -a "v$VERSION" -m "Nightly learning run $VERSION" || echo "Tag exists"
          git push --tags 2>/dev/null || echo "Tags already pushed"
      
      - name: Report to Slack
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "Teaching Agent Run Complete",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ job.status == 'success' && '✅' || '❌' }} *Teaching Agent Nightly*\n*Status:* ${{ job.status }}\n*Timestamp:* $(date -u +'%Y-%m-%d %H:%M UTC')"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Run" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    },
                    {
                      "type": "button",
                      "text": { "type": "plain_text", "text": "View Skills" },
                      "url": "${{ github.server_url }}/${{ github.repository }}/tree/main/skills"
                    }
                  ]
                }
              ]
            }
